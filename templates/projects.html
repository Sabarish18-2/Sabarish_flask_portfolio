<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects - Sabarish</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: rgba(0,0,0,0.5);
}

nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
}

nav a {
  color: white;
  text-decoration: none;
}

nav a:hover {
  color: #38bdf8;
}

/* PROJECTS */
.container {
  padding: 100px 50px;
  text-align: center;
}

h1 {
  font-size: 2.5rem;
}

.projects {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card h3 {
  margin-bottom: 10px;
}

.card p {
  color: #cbd5f5;
  font-size: 0.9rem;
}
</style>
</head>

<body>

<nav>
  <h2>Sabarish</h2>
  <ul>
    <li><a href="{{url_for('home')}}">Home</a></li>
    <li><a href="{{url_for('about')}}">About</a></li>
    <li><a href="{{url_for('projects')}}">Projects</a></li>
  </ul>
</nav>

<div class="container">
  <h1>My Projects</h1>

  <div class="projects">
    <div class="card">
      <h3>AI Chatbot</h3>
      <p>Smart chatbot using Flask, LangChain, and vector search.</p>
    </div>

    <div class="card">
      <h3>Portfolio Website</h3>
      <p>Modern responsive portfolio with chatbot integration.</p>
    </div>

    <div class="card">
      <h3>ML Prediction System</h3>
      <p>Machine learning model for predictive analytics.</p>
    </div>
  </div>
</div>

</body>
</html>
